<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Camera monitoring dashboard">
    <meta name="theme-color" content="#0d1117">
    <title>Camera Monitor</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <h1>Camera Monitor</h1>
        <div class="global-controls">
            <div id="connStatus" class="conn-status conn-status--connecting" title="Server connection">
                <span class="conn-dot"></span>
                <span class="conn-label">Connecting…</span>
            </div>
            <button id="addCameraBtn" class="btn btn-primary">
                <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
                Add Camera
            </button>
            <button id="logoutBtn" class="btn" title="Log out">
                <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Logout
            </button>
        </div>
    </div>

    <div class="dashboard">
        <div class="camera-grid" id="cameraGrid">
            <!-- Empty state rendered by admin.js -->
        </div>

        <!-- Enlarge modal -->
        <div id="enlargeModal">
            <div class="modal-content enlarge-content">
                <div class="enlarge-toolbar">
                    <div class="enlarge-title">
                        <span id="enlargeName">Camera</span>
                        <span id="enlargeTimestamp" class="enlarge-timestamp"></span>
                    </div>
                    <div class="enlarge-actions">
                        <button id="enlargePrev" class="icon-btn" title="Previous camera (←)" aria-label="Previous">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
                        </button>
                        <button id="enlargeNext" class="icon-btn" title="Next camera (→)" aria-label="Next">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
                        </button>
                        <button id="enlargeSnapshot" class="icon-btn" title="Snapshot (S)" aria-label="Snapshot">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                        </button>
                        <button id="enlargeFullscreen" class="icon-btn" title="Fullscreen (F)" aria-label="Fullscreen">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="4 14 4 20 10 20"/><polyline points="20 10 20 4 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                        </button>
                        <button id="closeModalBtn" class="icon-btn icon-btn--danger" title="Close (Esc)" aria-label="Close">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                    </div>
                </div>
                <img id="modalImage" src="" alt="Enlarged camera view" />
            </div>
        </div>

        <!-- Add Camera modal -->
        <div id="addCameraModal" class="modal">
            <div class="modal-content">
                <h2 class="modal-title">Add RTSP Camera</h2>
                <p class="modal-subtitle">Connect an IP camera via its RTSP stream URL</p>

                <div class="form-field">
                    <label for="rtspName">Camera Name</label>
                    <input type="text" id="rtspName" class="form-input" placeholder="e.g. Front Door" autocomplete="off">
                </div>
                <div class="form-field">
                    <label for="rtspUrl">RTSP URL</label>
                    <input type="text" id="rtspUrl" class="form-input" placeholder="rtsp://192.168.1.100:8554/live" autocomplete="off">
                </div>

                <div id="addCameraError" class="form-error"></div>

                <div class="modal-actions">
                    <button id="cancelAddCamera" class="btn">Cancel</button>
                    <button id="submitAddCamera" class="btn btn-primary">Add Camera</button>
                </div>
            </div>
        </div>

        <!-- Settings modal -->
        <div id="renameModal" class="modal">
            <div class="modal-content">
                <h2 class="modal-title">Camera Settings</h2>
                <div class="form-field">
                    <label for="renameInput">Name</label>
                    <input type="text" id="renameInput" class="form-input" autocomplete="off">
                </div>
                <div id="renameError" class="form-error"></div>
                <div class="modal-actions">
                    <button id="cancelRename" class="btn">Cancel</button>
                    <button id="submitRename" class="btn btn-primary">Save</button>
                </div>
                <div class="settings-danger-zone">
                    <button id="deleteCameraBtn" class="btn btn-danger btn-block">Remove camera</button>
                </div>
            </div>
        </div>

        <!-- Confirm modal -->
        <div id="confirmModal" class="modal">
            <div class="modal-content">
                <h2 id="confirmTitle" class="modal-title">Are you sure?</h2>
                <p id="confirmMessage" class="modal-subtitle"></p>
                <div class="modal-actions">
                    <button id="confirmCancel" class="btn">Cancel</button>
                    <button id="confirmOk" class="btn btn-danger">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast container -->
    <div id="toastStack" class="toast-stack"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="ui.js"></script>
    <script src="admin.js"></script>
</body>
</html>
