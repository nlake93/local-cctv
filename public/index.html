<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d1117">
    <meta name="description" content="Camera streaming client">

    <title>Camera Stream</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .pairing-code-input {
            width: 180px;
            text-align: center;
            font-family: var(--font-mono);
            font-size: 28px;
            font-weight: 600;
            letter-spacing: 8px;
            padding: 12px;
            background: var(--bg-inset);
            border: 1px solid var(--border);
            border-radius: var(--r-md);
            color: var(--text);
        }
        .pairing-code-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }
        .pairing-error {
            color: var(--danger);
            text-align: center;
            margin-bottom: 12px;
            font-size: 13px;
            min-height: 1em;
        }
        .pairing-timer {
            text-align: center;
            margin-top: 12px;
            color: var(--text-muted);
            font-size: 12px;
            font-family: var(--font-mono);
        }
    </style>
</head>
<body>
    <div class="camera-container">
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display: none;"></canvas>

        <div id="zoomControls" class="zoom-controls" style="display: none;">
            <div class="zoom-info">
                <span id="zoomValue">1.0×</span>
            </div>
            <input type="range" id="zoomSlider" min="1" max="10" step="0.1" value="1" class="zoom-slider">
        </div>
    </div>

    <div class="controls">
        <button id="startCamera" class="btn primary">Start Camera</button>
        <button id="switchCamera" class="btn primary" style="display: none;">Switch</button>
        <button id="toggleCameraView" class="btn secondary" style="display: none;">Hide Preview</button>
        <button id="flashlightBtn" class="btn secondary" style="display: none;">Flash</button>
        <button id="stopBtn" class="btn secondary" style="display: none;">Stop</button>
    </div>

    <!-- Pairing Modal -->
    <div id="pairingModal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2 class="modal-title">Enter pairing code</h2>
            <p class="modal-subtitle">Enter the 3-digit code shown on the admin dashboard</p>
            <div style="display: flex; justify-content: center; margin-bottom: 16px;">
                <input type="text" id="pairingCode" class="pairing-code-input" maxlength="3" pattern="[0-9]*" placeholder="000" autocomplete="off" inputmode="numeric">
            </div>
            <div id="pairingError" class="pairing-error" style="display: none;"></div>
            <div class="modal-actions">
                <button id="cancelPairing" class="btn">Cancel</button>
                <button id="submitPairing" class="btn btn-primary">Connect</button>
            </div>
            <div id="pairingTimer" class="pairing-timer"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="camera.js"></script>
</body>
</html>
